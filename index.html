<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="3600">

<style>
body{
  margin:0;
  background:#d9d9d9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

#board{
  position:relative;
  width:100%;
  max-width:1920px;
  aspect-ratio:16 / 9;
}

#bg{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
}

#days{
  position:absolute;
  left:50%;
  top:49%;
  transform:translate(-50%,-50%);
  font-size:11vw;
  font-weight:900;
  color:#0070C0;
  line-height:1;
  white-space:nowrap;
  text-shadow:
    2px 2px 0 white,
    4px 4px 6px rgba(0,0,0,.35);
}

@media (max-width:768px){
  #days{
    font-size:14vw;
    top:49%;
  }
}
</style>
</head>

<body>

<div id="board">
  <img src="background.png" id="bg">
  <div id="days">0</div>
</div>

<script>
const startDate = new Date("2025-11-13T00:00:00");

function updateCounter(){
  const today = new Date();
  const start = new Date(startDate);

  today.setHours(0,0,0,0);
  start.setHours(0,0,0,0);

  const diff = today - start;
  const days = Math.floor(diff / (1000*60*60*24));

  document.getElementById("days").innerText = days;
}

updateCounter();
setInterval(updateCounter, 60000);
</script>

</body>
</html>
