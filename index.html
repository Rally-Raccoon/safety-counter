<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="3600">

<style>
html, body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#ffffff;
  font-family:Arial, sans-serif;
}

/* Full screen centered background */
body{
  background-image:url("background.png");
  background-size:contain;          /* shows full image, no crop */
  background-position:center center;
  background-repeat:no-repeat;
}

/* Counter */
#days{
  position:absolute;
  left:50%;
  top:49%;                         /* vertical placement in center box */
  transform:translate(-50%, -50%);
  
  font-weight:bold;
  color:#0070C0;
  line-height:1;
  white-space:nowrap;

  /* Responsive sizing for monitor + TV */
  font-size:min(10vw, 190px);
}

/* Large TVs / 4K displays */
@media (min-width:1920px){
  #days{
    font-size:min(9vw, 260px);
    top:49%;
  }
}

/* Smaller monitors / laptops */
@media (max-width:1366px){
  #days{
    font-size:min(11vw, 165px);
    top:49%;
  }
}
</style>
</head>

<body>

<div id="days">0</div>

<script>
const startDate = new Date("2025-11-13T00:00:00");

function updateCounter(){
  const today = new Date();
  const start = new Date(startDate);

  start.setHours(0,0,0,0);
  today.setHours(0,0,0,0);

  const diff = today - start;
  const days = Math.floor(diff / (1000*60*60*24));

  document.getElementById("days").textContent = days;
}

updateCounter();
setInterval(updateCounter, 60000);
</script>

</body>
</html>
